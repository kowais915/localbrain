name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Only one release at a time.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create tags, releases, and commit the changelog
  issues: write # comment on released issues/PRs
  pull-requests: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # Don't run on forks.
    if: github.repository == 'kowais915/localbrain'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build & test
        run: |
          npm run build
          npm test
          npm run test:e2e

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To also publish to npm later: add an NPM_TOKEN secret and flip
          # npmPublish to true in .releaserc.json.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
